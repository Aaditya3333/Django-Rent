{% extends "profile_dashboard.html" %}
{% load static %}
{% block maincontent %}
  <h1>Update Profile</h1>
  <div class="container">
    <div class="row">
        <div class="col-6">

            {% if request.user.profile.profile_picture %}
                  
               
            <img src="{{request.user.profile.profile_picture.url}}" alt="Default Profile Image"
            style="width: 200px; height: 200px; padding: 20px; border-radius: 50%; object-fit: contain;">
        {% else %}
        <img src="{% static 'images/aad.jpg' %}" alt="Default Profile Image"
            style="width: 200px; height: 200px; padding: 20px; border-radius: 50%; object-fit: contain;">
            {% endif %}
        </div>
        <div class="col-6">
            <form method="post" enctype="multipart/form-data" action="">
                {% csrf_token %}
                {{form}}
                <input type="submit" value="Update Profile">
            </form>
        </div>
    </div>
  </div>
{% endblock maincontent %}
