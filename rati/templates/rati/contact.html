{% extends "base.html" %}
{% load static %}
{% block title %}
  Contact
{% endblock title %}
{% block content %}
<section class="contact_section ">
  <div class="container">
    <div class="heading_container">
      <h2>
        Get In Touch
      </h2>
    </div>
  </div>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-6 px-0">
        <div class="map_container">
          <div class="map-responsive">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d28276.585690591346!2d85.35424208625177!3d27.637731828210367!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb10bc25b5d7ff%3A0x5344d02a82910012!2sLubhu!5e0!3m2!1sen!2snp!4v1747634694209!5m2!1sen!2snp" width="600" height="300" frameborder="0" style="border:0; width: 100%; height:100%" allowfullscreen></iframe>
        </div>
        </div>
      </div>
      <div class="col-lg-4 col-md-5 ">
        <div class="form_container">
          <form method="post" action="{% url 'contact' %}">
            {% csrf_token %}
            <div>
              <input type="text" placeholder="Name" name="name" />
            </div>
            <div>
              <input type="email" placeholder="Email" name="email" />
            </div>
            <div>
              <input type="text" placeholder="Phone Number" name="phone" />
            </div>
            <div>
              <input type="text" class="message-box" placeholder="Message" name="message" />
            </div>
            <div class="d-flex ">
              <button>
                Send
              </button>
              {% if messages %}
              {% for message in messages  %}
              <div class="alert alert-success">
                {{ message }}
            </div>
              {% endfor %}
              {% endif %}
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
{% endblock content %}
